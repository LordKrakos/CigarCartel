{% load static %}
<!DOCTYPE html>

<html data-theme="light" lang="en">

    <head>
        <!-- Meta tags -->
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Find your nearest Cigar Cartel store.">
        <meta name="keywords" content="Cigar Cartel, store locator, cigars, tobacco">
        <meta name="author" content="Joseph Krakos Jr.">

        <!-- Bootstrap -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
        >

        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Ephesis&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
        >

        <!-- Custom Scss -->
        <link rel="stylesheet" href="{% static 'storelocator/scss/styles.css' %}?v=1.0">
        <link rel="stylesheet" href="{% static 'storelocator/scss/index.css' %}?v=1.0">

        <title>{% block title %}{% endblock %}</title>

        <!-- Font Awesome -->
        <script
            src="https://kit.fontawesome.com/8f5b2d3aa3.js"
            crossorigin="anonymous"
            data-search-pseudo-elements
        >
        </script>
         
    </head>

    <body>
        <div id="age-modal" class="modal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">

                    <div class="modal-header">
                        <h5 class="modal-title">Age Verification</h5>
                    </div>

                    <div class="modal-body">
                        <p>You must be at least 21 years of age or older to access this site.</p>
                    </div>

                    <footer class="modal-footer">
                        <button id="ageYes" type="button" class="btn btn-primary" data-bs-dismiss="modal">
                            I am 21+
                        </button>

                        <button id="ageNo" type="button" class="btn btn-secondary">
                            I am under 21
                        </button>
                    </footer>

                </div>
            </div>
        </div>

        <header>
            <div class="container-fluid">

                <div class="logo-container">
                    <a href="{% url 'storelocator:index' %}">
                        <img
                            class="logo"
                            src="{% static 'storelocator/images/logo.png' %}"
                            alt="Cigar Cartel Logo"
                        />
                    </a>
                </div>

                <label class="theme-toggle-label" for="theme-toggle">
                    <input
                        id="theme-toggle"
                        name="theme-toggle"
                        class="theme-toggle"
                        type="checkbox"
                    />

                    <i class="fas fa-sun"></i>

                    <span class="slider"></span>

                    <i class="fas fa-moon"></i>
                </label>

            </div>
        </header>

        {% block body %}
        {% endblock %}

        <footer>
            <div class="container">
                <p>&copy; 2025 Your Company</p>
            </div>
        </footer>

        {% block scripts %}
        {% endblock %}
    </body>

</html>
